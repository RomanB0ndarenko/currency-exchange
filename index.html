<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Kur$valut — Обмін валют Київ</title>

<link rel="icon" href="/favicon.ico">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#05140e;
  --bg2:#082217;
  --card: rgba(15,55,38,.45);
  --stroke: rgba(255,255,255,.12);
  --text:#eafff3;
  --muted:rgba(255,255,255,.65);
  --gold:#d4af37;
  --accent:#1ee38a;
  --shadow:0 40px 90px rgba(0,0,0,.55);
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:Manrope,sans-serif;
  color:var(--text);
  background:
  radial-gradient(1200px 900px at 10% 20%, rgba(30,227,138,.18), transparent 60%),
  radial-gradient(1400px 900px at 90% 10%, rgba(42,168,255,.15), transparent 60%),
  linear-gradient(180deg,var(--bg2),var(--bg1));
  min-height:100vh;
}

/* FULL WIDTH */
.container{
  width:100%;
  padding:40px 60px;
  display:flex;
  flex-direction:column;
  gap:40px;
}

/* LOGO В УГЛУ */
.hero{
  position:absolute;
  top:30px;
  left:40px;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:10px;
}

.hero img{
  width:180px;
  height:auto;
  filter:drop-shadow(0 25px 45px rgba(0,0,0,.6));
}

.hero .subtitle{
  font-size:22px;
  font-weight:900;
  color:var(--gold);
  letter-spacing:.5px;
}

/* GRID */
.topGrid{
  margin-top:200px;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:40px;
}

.card{
  padding:30px;
  border-radius:28px;
  background:var(--card);
  border:1px solid var(--stroke);
  backdrop-filter:blur(14px);
  box-shadow:var(--shadow);
}

.cardTitle{
  font-weight:900;
  margin-bottom:18px;
  font-size:18px;
  letter-spacing:.4px;
}

.cardTitle a{
  color:var(--text);
  text-decoration:none;
}

.cardTitle a:hover{
  text-decoration:underline;
}

.kv{
  display:grid;
  gap:12px;
  font-weight:700;
  color:var(--muted);
  font-size:16px;
}

.socialRow{
  margin-top:20px;
  display:flex;
  gap:20px;
}

.iconBtn{
  width:65px;
  height:65px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:20px;
  border:1px solid var(--stroke);
  background:rgba(0,0,0,.2);
  font-size:24px;
  color:white;
  transition:.2s;
}
.iconBtn:hover{
  transform:translateY(-4px);
  border-color:var(--accent);
}

/* MAIN GRID */
.mainGrid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:50px;
}

.ratesCard{
  padding:0;
}

.ratesHead{
  display:flex;
  justify-content:flex-end;
  padding:20px 30px;
  border-bottom:1px solid rgba(255,255,255,.1);
}

table{
  width:100%;
  border-collapse:separate;
  border-spacing:0 18px;
  padding:20px 30px 30px;
}

thead th{
  color:var(--muted);
  text-align:left;
  font-size:14px;
}

tbody tr{
  background:rgba(0,0,0,.2);
  border-radius:18px;
}

tbody td{
  padding:22px 16px;
  font-weight:900;
  font-size:20px;
}

.flagImg{
  width:32px;
  border-radius:6px;
  margin-right:14px;
}

.curCell{
  display:flex;
  align-items:center;
}

.footer{
  text-align:center;
  opacity:.6;
  font-weight:700;
}

/* MOBILE */
@media(max-width:1200px){
  .topGrid{grid-template-columns:1fr;}
  .mainGrid{grid-template-columns:1fr;}
  .hero{position:static;margin-bottom:40px;}
}
</style>
</head>

<body>

<div class="hero">
  <img src="logo.jpg" alt="Kur$valut">
  <div class="subtitle">Обмін валют</div>
</div>

<div class="container">

  <div class="topGrid">

    <div class="card">
      <div class="cardTitle">
        <a target="_blank"
        href="https://www.google.com/maps/search/?api=1&query=Київ+Велика+Васильківська+45">
        <i class="fa-solid fa-location-dot"></i> Адреса
        </a>
      </div>
      <div class="kv">
        <div>м. Київ, вул. Велика Васильківська, 45</div>
      </div>

      <div style="margin-top:30px" class="cardTitle">
        <i class="fa-solid fa-clock"></i> Режим роботи
      </div>
      <div class="kv">
        <div>Пн – Пт: 09:00 – 19:00</div>
        <div>Сб: 10:00 – 18:00</div>
        <div>Нд: Вихідний</div>
      </div>
    </div>

    <div class="card">
      <div class="cardTitle">
        <i class="fa-solid fa-phone"></i> Контакти
      </div>

      <div class="kv">
        <div><strong>+380 77 070 0745</strong></div>
        <div>@kursvalutobmin</div>
      </div>

      <div class="socialRow">
        <a class="iconBtn" href="https://wa.me/380770700745" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
        <a class="iconBtn" href="viber://chat?number=%2B380770700745"><i class="fa-brands fa-viber"></i></a>
        <a class="iconBtn" href="https://t.me/kursvalutobmin" target="_blank"><i class="fa-brands fa-telegram"></i></a>
        <a class="iconBtn" href="tel:+380770700745"><i class="fa-solid fa-phone"></i></a>
      </div>
    </div>

    <div class="card">
      <div class="cardTitle">
        <i class="fa-solid fa-star"></i> Переваги
      </div>
      <div class="kv">
        <div>кращий курс</div>
        <div>вигідно та швидко</div>
        <div>індивідуальний підхід</div>
      </div>
    </div>

  </div>

  <div class="mainGrid">

    <div class="card ratesCard">
      <div class="ratesHead">Оновлено: <span id="time"></span></div>
      <table>
        <thead>
          <tr>
            <th>Валюта</th>
            <th>Купівля</th>
            <th>Продаж</th>
          </tr>
        </thead>
        <tbody id="ratesBody"></tbody>
      </table>
    </div>

  </div>

  <div class="footer">© 2026 Kur$valut • Київ</div>

</div>

<script>
const ORDER=["USD","EUR","PLN","GBP","CHF","CAD","CZK","TRY"];
const FLAGS={
USD:"https://flagcdn.com/us.svg",
EUR:"https://flagcdn.com/eu.svg",
PLN:"https://flagcdn.com/pl.svg",
GBP:"https://flagcdn.com/gb.svg",
CHF:"https://flagcdn.com/ch.svg",
CAD:"https://flagcdn.com/ca.svg",
CZK:"https://flagcdn.com/cz.svg",
TRY:"https://flagcdn.com/tr.svg",
};

function fmt(n){
const num=Number(n);
if(!Number.isFinite(num))return"—";
return num.toFixed(2);
}

async function loadRates(){
const res=await fetch("rates.json?"+Date.now());
const data=await res.json();
const tbody=document.getElementById("ratesBody");
tbody.innerHTML="";
for(const cur of ORDER){
if(!data[cur])continue;
const r=data[cur];
const tr=document.createElement("tr");
tr.innerHTML=`
<td>
<div class="curCell">
<img class="flagImg" src="${FLAGS[cur]}">
<strong>${cur}</strong>
</div>
</td>
<td>${fmt(r.buy)}</td>
<td>${fmt(r.sell)}</td>
`;
tbody.appendChild(tr);
}
const now=new Date();
document.getElementById("time").innerText=
now.getHours().toString().padStart(2,"0")+":"+
now.getMinutes().toString().padStart(2,"0");
}
loadRates();
setInterval(loadRates,30000);
</script>

</body>
</html>

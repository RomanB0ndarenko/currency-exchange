<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <title>Kur$valut - Обмін валют Київ</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0b2e1d;
            color: white;
        }
        
        header {
            background-color: #124d32;
            padding: 20px;
            text-align: center;
        }
        
        .logo {
            font-size: 28px;
            font-weight: bold;
        }
        
        .contact {
            margin-top: 10px;
            line-height: 1.6;
        }
        
        .container {
            padding: 40px;
            text-align: center;
        }
        
        .rates {
            background: #1f5e3c;
            padding: 25px;
            border-radius: 10px;
            display: inline-block;
            min-width: 320px;
        }
        
        .rate-item {
            font-size: 18px;
            margin: 8px 0;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        footer {
            margin-top: 40px;
            padding: 20px;
            background: #124d32;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">💱 Kur$valut</div>
        <div class="contact">
            ✍🏻 Замовити / забронювати<br> 📲 Telegram: @kursvalutobmin<br> 📞 Viber|WhatsApp: +380770700745<br><br>м. Київ, вул. Велика Васильківська, 45<br> Понеділок - П'ятниця 9:00 - 19:00<br> Субота 10:00 - 18:00<br> Неділя — Вихідний
        </div>
    </header>

    <div class="container">
        <h2>Курси валют</h2>

        <div class="rates" id="ratesContainer">
            Завантаження курсів...
        </div>
    </div>

    <footer>
        © 2026 Kur$valut | Обмін валют Україна
    </footer>

    <script>
        async function loadRates() {
            let response = await fetch("rates.json");
            let data = await response.json();

            let container = document.getElementById("ratesContainer");
            container.innerHTML = "";

            for (let currency in data) {
                let item = document.createElement("div");
                item.className = "rate-item";
                item.innerText =
                    currency + " | Купівля: " +
                    data[currency].buy +
                    " | Продаж: " +
                    data[currency].sell;
                container.appendChild(item);
            }
        }

        loadRates();
        setInterval(loadRates, 60000);
    </script>

</body>

</html>

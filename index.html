<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Kur$valut — Обмін валют Київ</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>

:root{
  /* Цвет фона взят с края логотипа */
  --bgDark:#022d1f;
  --bgMid:#053b28;

  --card: rgba(10,40,28,.55);
  --stroke: rgba(255,255,255,.08);

  --text:#eafff3;
  --muted: rgba(234,255,243,.7);
  --muted2: rgba(234,255,243,.5);

  --accent:#1ee38a;
  --gold:#ffd44a;

  --shadow: 0 30px 80px rgba(0,0,0,.55);
  --r:28px;
  --gap:44px;
}

*{box-sizing:border-box}
html,body{height:100%;margin:0}

body{
  font-family: Manrope, sans-serif;
  color:var(--text);
  overflow-x:hidden;

  /* Фон теперь как у логотипа */
  background: linear-gradient(180deg,var(--bgMid),var(--bgDark));
}

/* HERO */
.hero{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
  padding-top:40px;
}

/* Убираем рамку */
.logoBig{
  width:min(1000px,85vw);
  border-radius:999px;
  display:block;

  /* мягкое растворение краёв */
  box-shadow:
    0 0 120px rgba(0,0,0,.7),
    0 0 200px rgba(2,45,31,.8);
}

/* убрали обводку полностью */
.logoBig{
  border:none;
}

.subtitle{
  font-size:32px;
  font-weight:900;
  color:var(--gold);
  margin:0;
}

/* GRID */
.wrap{
  padding:40px 60px;
}

.container{
  max-width:1600px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:var(--gap);
}

.topGrid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:var(--gap);
}

.card{
  padding:26px;
  border-radius:var(--r);
  background:var(--card);
  border:1px solid var(--stroke);
  backdrop-filter:blur(12px);
  box-shadow:var(--shadow);
}

.cardTitle{
  font-weight:900;
  margin-bottom:14px;
}

.kv{
  display:grid;
  gap:8px;
  font-weight:700;
  color:var(--muted);
}

.phoneBig{
  font-size:28px;
  font-weight:900;
  margin-bottom:18px;
}

.socialRow{
  display:flex;
  gap:16px;
}

.iconBtn{
  width:60px;
  height:60px;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.25);
  border:1px solid rgba(255,255,255,.15);
  color:white;
  transition:.2s;
}

.iconBtn:hover{
  transform:translateY(-4px);
  background:rgba(0,0,0,.35);
}

footer{
  text-align:center;
  padding:30px 0;
  color:var(--muted2);
}

@media(max-width:1100px){
  .topGrid{grid-template-columns:1fr}
}

</style>
</head>

<body>

<div class="hero">
  <img class="logoBig" src="logo.jpg" alt="Kur$valut">
  <p class="subtitle">Обмін валют</p>
</div>

<div class="wrap">
<div class="container">

<div class="topGrid">

<div class="card">
<div class="cardTitle">Адреса</div>
<div class="kv">
<div><strong>м. Київ, вул. Велика Васильківська, 45</strong></div>
</div>
</div>

<div class="card">
<div class="cardTitle">Контакти</div>
<div class="phoneBig">+380 77 070 0745</div>
<div class="socialRow">
<a class="iconBtn" href="#"><i class="fa-brands fa-telegram"></i></a>
<a class="iconBtn" href="#"><i class="fa-brands fa-whatsapp"></i></a>
<a class="iconBtn" href="#"><i class="fa-brands fa-viber"></i></a>
<a class="iconBtn" href="#"><i class="fa-solid fa-phone"></i></a>
</div>
</div>

<div class="card">
<div class="cardTitle">Переваги</div>
<div class="kv">
<div>Кращий курс</div>
<div>Вигідно та швидко</div>
<div>Індивідуальний підхід</div>
</div>
</div>

</div>

<footer>© 2026 Kur$valut • Київ</footer>

</div>
</div>

</body>
</html>
